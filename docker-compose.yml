version: "3.8"

services:

  # ─────────────────────────────────────────
  # MQTT Broker — receives sensor data
  # ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: gpl_mosquitto
    ports:
      - "1883:1883"       # MQTT
      - "9001:9001"       # WebSocket (optional)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ─────────────────────────────────────────
  # InfluxDB — time-series database
  # ─────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: gpl_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Backend — Node.js API + alert engine
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gpl_backend
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend — React dashboard
  # ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: gpl_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
