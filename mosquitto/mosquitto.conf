# ─────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker — Configuration
# Projet : Surveillance Sphère GPL — District NAFTAL Batna
# ─────────────────────────────────────────────────────────────

# Standard MQTT port
listener 1883

# WebSocket support (optional, useful for browser-based MQTT tools)
listener 9001
protocol websockets

# Allow connections without username/password (development mode)
# In production, replace with: password_file /mosquitto/config/passwd
allow_anonymous true

# Persistence — saves messages to disk so nothing is lost on restart
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Maximum number of queued messages per client
max_queued_messages 1000
